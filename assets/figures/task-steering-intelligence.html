<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Task Intelligence and Steering Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --ink: #0a2540;
    --ink-2: #425466;
    --ink-3: #697386;
    --line: #d6dde6;
    --line-2: #cbd3df;
    --paper: #ffffff;
    --soft: #eaf6ee;
    --axis: #0a2540;
    --yellow: #b15c00;
    --blue: #2f6df6;
    --magenta: #b8326b;
    --green: #00875a;
    --cyan: #0c6fa6;
    --orange: #ed5b2c;
    --purple: #6b3fc8;
  }

  * {
    box-sizing: border-box;
  }

  html,
  body {
    margin: 0;
    min-height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: Inter, "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: block;
    overflow: hidden;
  }

  .slide {
    width: 100vw;
    height: 100vh;
    min-width: 0;
    min-height: 0;
    background: var(--bg);
    overflow: hidden;
    position: relative;
    padding: 0;
  }

  .slide::before {
    content: none;
  }

  .timeline {
    position: relative;
    z-index: 1;
    width: 100%;
    height: 100%;
    display: block;
  }

  .chart-title {
    fill: var(--ink);
    font-size: 33px;
    font-weight: 400;
  }

  .axis-label {
    fill: var(--ink);
    font-size: 25px;
    font-weight: 400;
  }

  .tick-label {
    fill: var(--ink);
    font-size: 25px;
    font-weight: 500;
  }

  .y-label {
    fill: var(--ink);
    font-size: 23px;
    font-weight: 400;
  }

  .series-label {
    font-size: 21px;
    font-weight: 600;
    line-height: 1.12;
  }

  .axis-line,
  .tick-line {
    stroke: var(--axis);
    stroke-width: 2;
    stroke-linecap: round;
  }

  .line {
    fill: none;
    stroke-width: 3.4;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .dot {
    stroke: none;
  }

  .future-divider {
    stroke: var(--line-2);
    stroke-width: 2.2;
    stroke-dasharray: 7 10;
  }

  .steering-heading,
  .task-heading {
    fill: var(--ink);
    font-size: 34px;
    font-weight: 800;
  }

  .time-label {
    fill: var(--ink-3);
    font-size: 18px;
    font-weight: 800;
    letter-spacing: 0.02em;
  }

  .steering-text {
    fill: var(--ink);
    font-size: 22px;
    line-height: 1.14;
    font-weight: 700;
  }

  .steer-icon {
    fill: none;
    stroke-width: 2.2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .steering-text {
    text-wrap: balance;
  }

  .steer-card {
    fill: var(--paper);
    stroke: var(--ink);
    stroke-width: 2;
  }

  .section-head {
    fill: var(--soft);
    stroke: var(--ink);
    stroke-width: 2;
  }

  .title-arrow {
    fill: none;
    stroke: var(--ink);
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .icon-panel {
    stroke: none;
  }

  .panel-seam {
    stroke: var(--ink);
    stroke-width: 2;
  }

  @media print {
    @page {
      size: 16in 9in;
      margin: 0;
    }

    html,
    body {
      width: 16in;
      height: 9in;
      background: var(--bg);
    }

    .slide {
      width: 16in;
      height: 9in;
      min-width: 0;
      min-height: 0;
    }
  }
</style>
</head>
