<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>CEOBench - Tool Usage Average per Week</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;family=JetBrains+Mono:wght@400;500;600&amp;display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0a2540;
    --ink-2: #425466;
    --ink-3: #697386;
    --line: #d6dde6;
    --line-2: #eef1f5;
    --paper: #ffffff;
    --bg: #ffffff;
  }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    font-family: 'Inter', system-ui, sans-serif;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }
  .page {
    width: 816px;
    margin: 0 auto;
    box-sizing: border-box;
  }
  .tile {
    background: var(--paper);
    border: 0;
    border-radius: 0;
    overflow: visible;
  }
  .tile .body { padding: 0; }
  .tile svg { display: block; width: 100%; height: auto; }
  svg text { font-family: 'Inter', sans-serif; }
  .title { font-size: 14px; fill: var(--ink); font-weight: 800; }
  .tool { font-family: 'JetBrains Mono', monospace; font-size: 9.2px; fill: var(--ink); font-weight: 500; }
  .xt { font-size: 10px; fill: var(--ink-2); font-weight: 700; }
  .axt { font-size: 11.5px; fill: var(--ink); font-weight: 800; }
  .val { font-size: 10px; fill: var(--ink); font-weight: 800; font-variant-numeric: tabular-nums; }
  @page {
    size: 816px 200px;
    margin: 0;
  }
  @media print {
    html,
    body {
      width: 816px;
      height: 200px;
    }
    .page {
      margin: 0;
    }
  }
</style>
</head>
<body>

<div class="page">
  <div class="tile"><div class="body"><div id="plot"></div></div></div>
</div>

<script>
const SVG_NS = 'http://www.w3.org/2000/svg';
function el(tag, attrs={}, parent){
  const n = document.createElementNS(SVG_NS, tag);
  for (const k in attrs) n.setAttribute(k, attrs[k]);
  if (parent) parent.appendChild(n);
  return n;
}

const PANELS = [
  {
    title: 'GPT-5.5',
    color: '#2f6df6',
    fill: '#86adff',
    data: [
      {rank:1, tool:'set_targeted_ops_spend', total:140, avg:1.9718},
      {rank:2, tool:'set_targeted_ad_spend', total:138, avg:1.9437},
      {rank:3, tool:'set_promotion', total:118, avg:1.6620},
      {rank:4, tool:'send_enterprise_deal', total:96, avg:1.3521},
      {rank:5, tool:'post_social_media', total:86, avg:1.2113},
      {rank:6, tool:'set_targeted_dev_spend', total:82, avg:1.1549},
      {rank:7, tool:'get_group_insights', total:76, avg:1.0704},
      {rank:8, tool:'list_research_projects', total:74, avg:1.0423},
      {rank:9, tool:'get_cost_info', total:71, avg:1.0000},
      {rank:10, tool:'set_capacity_tier', total:71, avg:1.0000},
    ],
  },
  {
    title: 'Claude Opus 4.7',
    color: '#ed5b2c',
    fill: '#ffad8d',
    data: [
      {rank:1, tool:'get_social_posts', total:109, avg:1.5352},
      {rank:2, tool:'list_research_projects', total:89, avg:1.2535},
      {rank:3, tool:'set_promotion', total:26, avg:0.3662},
      {rank:4, tool:'set_daily_spend', total:18, avg:0.2535},
      {rank:5, tool:'get_group_insights', total:14, avg:0.1972},
      {rank:6, tool:'get_market_overview', total:9, avg:0.1268},
      {rank:7, tool:'set_targeted_ad_spend', total:9, avg:0.1268},
      {rank:8, tool:'set_targeted_dev_spend', total:9, avg:0.1268},
      {rank:9, tool:'get_cost_info', total:6, avg:0.0845},
      {rank:10, tool:'post_social_media', total:6, avg:0.0845},
    ],
  },
];

const W = 816, H = 200;
const PANEL_W = 406, GAP = 4;
const PAD_L = 136, PAD_R = 8, PAD_T = 24, PAD_B = 34;
const INNER_W = PANEL_W - PAD_L - PAD_R;
const INNER_H = H - PAD_T - PAD_B;
const X_MAX = 2.0;
const TICKS = [0, 0.5, 1.0, 1.5, 2.0];

function fmtTick(v){
  return Number.isInteger(v) ? v.toFixed(0) : v.toFixed(1);
}

function fmtValue(v){
  return v.toFixed(2);
}

function drawPanel(svg, panel, x0){
  const plotX0 = x0 + PAD_L;
  const plotX1 = x0 + PANEL_W - PAD_R;
  const y0 = PAD_T;
  const y1 = H - PAD_B;
  const xS = v => plotX0 + Math.max(0, Math.min(X_MAX, v)) / X_MAX * INNER_W;

  const head = el('text', {x:x0 + PAD_L, y:15, class:'title'}, svg);
  head.textContent = panel.title;

  TICKS.forEach(tick => {
    const x = xS(tick);
    el('line', {x1:x, x2:x, y1:y0, y2:y1, stroke:tick === 0 ? '#0a2540' : '#d6dde6', 'stroke-width':tick === 0 ? 1 : 0.75, 'stroke-dasharray':tick === 0 ? '' : '2 3'}, svg);
    const t = el('text', {x, y:y1 + 14, class:'xt', 'text-anchor':'middle'}, svg);
    t.textContent = fmtTick(tick);
  });

  el('line', {x1:plotX0 - 2, x2:plotX1 + 2, y1:y1, y2:y1, stroke:'#0a2540', 'stroke-width':1}, svg);

  const rowH = INNER_H / panel.data.length;
  const barH = 8;
  panel.data.forEach((d, i) => {
    const cy = y0 + rowH * (i + 0.5);
    const barY = cy - barH / 2;
    const barX1 = xS(d.avg);
    const labelY = cy + 3.2;

    const lab = el('text', {x:plotX0 - 4, y:labelY, class:'tool', 'text-anchor':'end'}, svg);
    lab.textContent = d.tool;

    el('rect', {x:plotX0, y:barY, width:Math.max(1, barX1 - plotX0), height:barH, rx:2, fill:panel.fill}, svg);
    el('line', {x1:barX1, x2:barX1, y1:barY, y2:barY + barH, stroke:panel.color, 'stroke-width':1.1}, svg);

    const tight = barX1 > plotX1 - 28;
    const vx = tight ? plotX1 - 2 : barX1 + 5;
    const v = el('text', {x:vx, y:labelY, class:'val', 'text-anchor':tight ? 'end' : 'start'}, svg);
    v.textContent = fmtValue(d.avg);
  });

  const axis = el('text', {x:plotX0 + INNER_W / 2, y:H - 5, class:'axt', 'text-anchor':'middle'}, svg);
  axis.textContent = 'Avg. uses per week';
}

function draw(){
  const mount = document.getElementById('plot');
  const svg = el('svg', {viewBox:`0 0 ${W} ${H}`, width:W, height:H, preserveAspectRatio:'xMinYMin meet'}, mount);
  drawPanel(svg, PANELS[0], 0);
  drawPanel(svg, PANELS[1], PANEL_W + GAP);
}

draw();
</script>
</body>
</html>
