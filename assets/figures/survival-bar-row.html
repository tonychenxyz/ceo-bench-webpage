<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>CEOBench - Skill Bars</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;family=JetBrains+Mono:wght@400;500;600&amp;display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0a2540;
    --ink-2: #425466;
    --ink-3: #697386;
    --line: #d6dde6;
    --line-2: #cbd3df;
    --paper: #ffffff;
    --bg: #ffffff;
    --brand: #2f6df6;
    --brand-soft: #d8e6ff;
    --orange: #ed5b2c;
    --orange-soft: #ffe7dc;
    --green: #00875a;
    --amber: #b15c00;
    --amber-soft: #ffe9c9;
    --teal: #0c6fa6;
    --teal-soft: #dcf0fb;
    --gray: #8792a2;
    --gray-soft: #eaf6ee;
    --green-soft: #d6f5e6;
  }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    font-family: 'Inter', system-ui, sans-serif;
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }
  .page {
    width: 1066px;
    margin: 0 auto;
    padding: 8px;
    box-sizing: border-box;
  }
  .page.single {
    width: 258px;
    padding: 0;
  }
  .row {
    display: grid;
    grid-template-columns: repeat(4, 258px);
    gap: 6px;
    align-items: stretch;
  }
  .page.single .row {
    display: block;
  }
  .page.single .panel {
    width: 258px;
  }
  .panel {
    min-width: 0;
  }
  .tile {
    background: var(--paper);
    border: 0;
    border-radius: 0;
    overflow: visible;
  }
  .tile .body {
    padding: 0;
  }
  .tile svg {
    display: block;
    width: 100%;
    height: auto;
  }
  .caption {
    display: none;
  }
  @page {
    size: 258px 200px;
    margin: 0;
  }
  @media print {
    html,
    body {
      width: 258px;
      height: 200px;
    }
    .page {
      width: 258px;
      padding: 0;
      margin: 0;
    }
    .row {
      display: block;
    }
  }
  svg text {
    font-family: 'Inter', sans-serif;
  }
  .yt {
    font-size: 12px;
    fill: var(--ink-2);
  }
  .xt {
    font-size: 11.5px;
    fill: var(--ink-2);
    font-weight: 700;
  }
  .axt {
    font-size: 12.5px;
    fill: var(--ink);
    font-weight: 800;
  }
  .val {
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 11px;
    fill: var(--ink);
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .std {
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 8.5px;
    fill: var(--ink-3);
    font-weight: 600;
  }
  .legend {
    font-size: 11px;
    fill: var(--ink-2);
    font-weight: 700;
  }
  .dir {
    font-family: 'Inter', 'Apple Color Emoji', 'Segoe UI Emoji', sans-serif;
    font-size: 13px;
    fill: var(--ink);
    font-weight: 800;
  }
</style>
</head>
<body>

<div class="page" id="page">
  <div class="row">
    <div class="panel" data-plot="A">
      <div class="tile"><div class="body"><div id="plotA"></div></div></div>
    </div>
    <div class="panel" data-plot="B">
      <div class="tile"><div class="body"><div id="plotB"></div></div></div>
    </div>
    <div class="panel" data-plot="C">
      <div class="tile"><div class="body"><div id="plotC"></div></div></div>
    </div>
    <div class="panel" data-plot="D">
      <div class="tile"><div class="body"><div id="plotD"></div></div></div>
    </div>
  </div>
</div>

<script>
const GROUPS = [
  {key:'gpt',     label:'GPT 5.5',          short:['GPT 5.5'],             color:'#2f6df6', fill:'#86adff'},
  {key:'opus',    label:'Claude Opus 4.7',  short:['Claude', 'Opus 4.7'], color:'#ed5b2c', fill:'#ffad8d'},
  {key:'other',   label:'Other models',     short:['Other'],               color:'#697386', fill:'#bcc8d6'},
];

const requestedPlot = new URLSearchParams(window.location.search).get('plot');
if(requestedPlot){
  document.getElementById('page').classList.add('single');
  document.querySelectorAll('.panel').forEach(panel => {
    if(panel.dataset.plot !== requestedPlot.toUpperCase()) panel.remove();
  });
}

const PLOTS = [
  {
    mountId: 'plotA',
    yLabel: 'Ads allocation efficiency',
    kind: 'pct',
    yMax: 0.44,
    ticks: [0, 0.1, 0.2, 0.3, 0.4],
    baseline: {y: 0.2, label: 'Random guess'},
    direction: 'up',
    bars: [
      {key:'gpt', mean:0.333733, sd:0.005937, n:3},
      {key:'opus', mean:0.138500, sd:0.074473, n:3},
      {key:'other', mean:0.096756, sd:0.076078, n:18},
    ]
  },
  {
    mountId: 'plotB',
    yLabel: 'Four-week forecast error',
    kind: 'pct',
    yMax: 7.0,
    ticks: [0, 1, 2, 3, 4, 5, 6, 7],
    padL: 62,
    yLabelOffset: 19,
    direction: 'down',
    bars: [
      {key:'gpt', mean:0.249233, sd:0.156431, n:3},
      {key:'opus', mean:0.479933, sd:0.248756, n:3},
      {key:'other', mean:1.794384, sd:3.892406, n:19},
    ]
  },
  {
    mountId: 'plotC',
    yLabel: ['Detect-competitor lag', '(weeks)'],
    kind: 'weeks',
    yMax: 4.0,
    ticks: [0, 1, 2, 3, 4],
    yLabelOffset: 24,
    direction: 'down',
    bars: [
      {key:'gpt', mean:1.000000, sd:0.000000, n:2},
      {key:'opus', mean:1.000000, sd:0.000000, n:3},
      {key:'other', mean:2.000000, sd:1.322876, n:17},
    ]
  },
  {
    mountId: 'plotD',
    yLabel: ['Weekly avg. count of "if"', 'in agent memo'],
    kind: 'count',
    yMax: 10,
    ticks: [0, 2, 4, 6, 8, 10],
    yLabelOffset: 20,
    bars: [
      {key:'gpt', mean:7.47, sd:1.37, n:3},
      {key:'opus', mean:2.74, sd:0.48, n:3},
      {key:'other', mean:2.63, sd:2.37, n:21},
    ]
  },
];

const SVG_NS = 'http://www.w3.org/2000/svg';
function el(tag, attrs={}, parent){
  const n = document.createElementNS(SVG_NS, tag);
  for(const k in attrs) n.setAttribute(k, attrs[k]);
  if(parent) parent.appendChild(n);
  return n;
}

function fmt(v, kind){
  if(kind === 'pct') return Math.round(v * 100) + '%';
  if(kind === 'weeks') return Number.isInteger(v) ? v.toFixed(0) : v.toFixed(1);
  if(kind === 'count') return v.toFixed(2);
  return v < 1 ? v.toFixed(2) : v.toFixed(1);
}

function tickFmt(v, kind){
  if(kind === 'pct') return Math.round(v * 100) + '%';
  if(kind === 'weeks') return v.toFixed(0);
  return v.toFixed(0);
}

function drawBarPlot(cfg){
  const W = 258, H = 200;
  const PAD_L = cfg.padL || 48, PAD_R = 8, PAD_T = 24, PAD_B = 44;
  const innerW = W - PAD_L - PAD_R;
  const innerH = H - PAD_T - PAD_B;
  const yMin = 0, yMax = cfg.yMax;
  const y = v => PAD_T + innerH - (Math.max(yMin, Math.min(yMax, v)) - yMin) / (yMax - yMin) * innerH;

  const mount = document.getElementById(cfg.mountId);
  const svg = el('svg', {viewBox:`0 0 ${W} ${H}`, preserveAspectRatio:'xMinYMin meet'});
  mount.appendChild(svg);

  cfg.ticks.forEach(tick => {
    const yy = y(tick);
    el('line', {x1:PAD_L, x2:W-PAD_R, y1:yy, y2:yy, stroke:'#d6dde6', 'stroke-width':0.8, 'stroke-dasharray':'2 3'}, svg);
    const tx = el('text', {x:PAD_L-6, y:yy+3.5, class:'yt', 'text-anchor':'end'}, svg);
    tx.textContent = tickFmt(tick, cfg.kind);
  });

  const axY = PAD_T + innerH;
  el('line', {x1:PAD_L, x2:PAD_L, y1:PAD_T-2, y2:axY+2, stroke:'#0a2540', 'stroke-width':1}, svg);
  el('line', {x1:PAD_L-2, x2:W-PAD_R+2, y1:axY, y2:axY, stroke:'#0a2540', 'stroke-width':1}, svg);

  if(cfg.direction){
    const dir = el('text', {x:PAD_L+2, y:14, class:'dir', 'text-anchor':'middle'}, svg);
    dir.textContent = '↑ ' + (cfg.direction === 'up' ? '👍' : '👎');
  }

  const yLabelLines = Array.isArray(cfg.yLabel) ? cfg.yLabel : [cfg.yLabel];
  const yLabelX = -(PAD_T + innerH / 2);
  const yLabelY = cfg.yLabelOffset || 13;
  const yLineGap = cfg.yLabelLineGap || 13;
  const yLab = el('text', {class:'axt', 'text-anchor':'middle', transform:'rotate(-90)'}, svg);
  yLabelLines.forEach((line, i) => {
    const tspan = el('tspan', {
      x: yLabelX,
      y: yLabelY + (i - (yLabelLines.length - 1) / 2) * yLineGap
    }, yLab);
    tspan.textContent = line;
  });

  const gap = 6;
  const barW = (innerW - gap * (GROUPS.length + 1)) / GROUPS.length;

  cfg.bars.forEach((d, i) => {
    const g = GROUPS.find(x => x.key === d.key);
    const x = PAD_L + gap + i * (barW + gap);
    const y0 = y(0);
    const yMean = y(d.mean);
    const h = Math.max(1, y0 - yMean);
    const top = y(Math.min(yMax, d.mean + d.sd));
    const bot = y(Math.max(0, d.mean - d.sd));
    const cx = x + barW / 2;

    el('rect', {x, y:yMean, width:barW, height:h, rx:2, fill:g.fill}, svg);
    el('line', {x1:cx, x2:cx, y1:top, y2:bot, stroke:'#0a2540', 'stroke-width':1.2}, svg);
    el('line', {x1:cx-5, x2:cx+5, y1:top, y2:top, stroke:'#0a2540', 'stroke-width':1.2}, svg);
    el('line', {x1:cx-5, x2:cx+5, y1:bot, y2:bot, stroke:'#0a2540', 'stroke-width':1.2}, svg);

    const valueY = Math.min(yMean, top) - 7;
    const v = el('text', {x:cx, y:valueY, class:'val', 'text-anchor':'middle'}, svg);
    v.textContent = fmt(d.mean, cfg.kind);

    const lines = Array.isArray(g.short) ? g.short : [g.short];
    lines.forEach((line, j) => {
      const lab = el('text', {x:cx, y:axY+14+j*13, class:'xt', 'text-anchor':'middle'}, svg);
      lab.textContent = line;
    });
  });

  if(cfg.baseline){
    const by = y(cfg.baseline.y);
    el('line', {x1:PAD_L, x2:W-PAD_R, y1:by, y2:by, stroke:'#0a2540', 'stroke-width':1.2, 'stroke-dasharray':'2 3', opacity:0.9}, svg);
    const lx = PAD_L + 6, ly = PAD_T + 3;
    el('line', {x1:lx, x2:lx+14, y1:ly, y2:ly, stroke:'#0a2540', 'stroke-width':1.2, 'stroke-dasharray':'2 3'}, svg);
    const leg = el('text', {x:lx+18, y:ly+3.5, class:'legend'}, svg);
    leg.textContent = cfg.baseline.label;
  }
}

PLOTS
  .filter(plot => !requestedPlot || plot.mountId === 'plot' + requestedPlot.toUpperCase())
  .forEach(drawBarPlot);
</script>
</body>
</html>
